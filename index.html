<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピースパズル</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f0f0f0;
}

h1 {
  margin: 20px;
}

#puzzle {
  width: 300px;
  height: 300px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 2px;
}

.tile {
  width: 100px;
  height: 100px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

.empty {
  background: #ccc;
  cursor: default;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}
  #score {
  font-size: 18px;
  margin-top: 10px;
</style>
</head>
<body>

<h1>スライドパズル</h1>
<button onclick="shuffle()">シャッフル</button>

<div id="puzzle"></div>

<script>
let tiles = [1,2,3,4,5,6,7,8,0];

function createPuzzle() {
  const puzzle = document.getElementById('puzzle');
  puzzle.innerHTML = '';

  tiles.forEach((num, index) => {
    const tile = document.createElement('div');
    tile.className = 'tile';

    if (num === 0) {
      tile.classList.add('empty');
    } else {
      tile.textContent = num;
      tile.onclick = () => moveTile(index);
    }

    puzzle.appendChild(tile);
  });
}

function moveTile(index) {
  const emptyIndex = tiles.indexOf(0);

  const validMoves = [
    emptyIndex - 1,
    emptyIndex + 1,
    emptyIndex - 3,
    emptyIndex + 3
  ];

  if (validMoves.includes(index)) {
    [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
    createPuzzle();
    checkWin();
  }
}

function shuffle() {
  for (let i = tiles.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }
  createPuzzle();
}

function checkWin() {
  const win = tiles.every((num, i) => num === (i+1)%9);
  if (win) {
    setTimeout(() => alert('クリア！'), 100);
  }
}

createPuzzle();
</script>

</body>
</html>
